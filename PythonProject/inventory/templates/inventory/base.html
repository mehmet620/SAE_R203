<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>{% block title %}Server Manager{% endblock %}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      font-size: 14px;
      background: #f0f2f5;
      color: #333;
    }

    nav {
      background: #2c3e50;
      padding: 10px 24px;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      align-items: center;
    }

    nav a {
      color: #cdd6e0;
      text-decoration: none;
      padding: 5px 10px;
      font-size: 13px;
    }

    nav a:hover { background: none; text-decoration: underline; font-weight: bold; }

    .content {
      max-width: 1100px;
      margin: 28px auto;
      padding: 0 20px;
    }

    h1, h2, h3 { margin-bottom: 14px; color: #2c3e50; }

    a { color: #2980b9; text-decoration: none; }
    a:hover { text-decoration: underline; font-weight: bold; }

    /* Bouton "+" */
    a[href*="create"] {
      display: inline-block;
      background: #27ae60;
      color: #fff;
      padding: 5px 12px;
      border-radius: 0;
      margin-bottom: 12px;
      font-size: 13px;
    }
    a[href*="create"]:hover { background: #27ae60; text-decoration: underline; font-weight: bold; }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    th {
      background: #2c3e50;
      color: #fff;
      padding: 9px 12px;
      text-align: left;
      font-weight: normal;
      font-size: 13px;
    }

    td { padding: 8px 12px; border-bottom: 1px solid #eee; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f7f9fb; }

    .messages { margin-bottom: 16px; }
    .messages p {
      background: #d4edda;
      border: 1px solid #c3e6cb;
      color: #155724;
      padding: 8px 12px;
      border-radius: 0;
      margin-bottom: 6px;
    }

    form p { margin-bottom: 10px; }
    input, select, textarea {
      padding: 6px 8px;
      border: 1px solid #ccc;
      border-radius: 0;
      font-size: 14px;
      width: 100%;
      max-width: 400px;
    }

    input[type="submit"], button {
      background: #2980b9;
      color: #fff;
      border: none;
      padding: 7px 18px;
      border-radius: 0;
      cursor: pointer;
      font-size: 14px;
      width: auto;
    }
    input[type="submit"]:hover, button:hover { background: #2980b9; text-decoration: underline; font-weight: bold; }
  </style>
</head>
<body>

<nav>
  <a href="{% url 'inventory:home' %}">Accueil</a>
  <a href="{% url 'inventory:server-list' %}">Serveurs</a>
  <a href="{% url 'inventory:service-list' %}">Services</a>
  <a href="{% url 'inventory:application-list' %}">Applications</a>
  <a href="{% url 'inventory:user-list' %}">Utilisateurs</a>
  <a href="{% url 'inventory:servertype-list' %}">Types</a>
  <a href="{% url 'inventory:resourceusage-list' %}">Usages</a>
  <a href="{% url 'inventory:report-index' %}">Rapports</a>
</nav>

<div class="content">

  {% if messages %}
    <div class="messages">
      {% for msg in messages %}<p>{{ msg }}</p>{% endfor %}
    </div>
  {% endif %}

  {% block content %}{% endblock %}

</div>

</body>
</html>
